name: Make.com Automated Render
on:
  workflow_dispatch:
    inputs:
      script:
        description: 'The story text'
        required: true
      video_url:
        description: 'Dropbox Video Link'
        required: true
      audio_url:
        description: 'Voiceover Link'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: |
          npx remotion render src/index.ts out/video.mp4 --props='{"script": "${{ github.event.inputs.script }}", "videoUrl": "${{ github.event.inputs.video_url }}", "audioUrl": "${{ github.event.inputs.audio_url }}"}'

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: out/video.mp4
